name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Drop AnglesiteContainer (and its native apple/containerization graph) from every SwiftPM/xcodebuild
# manifest evaluation in CI. `swift build`/`swift test` compile all products, so without this the
# macos-15 runner would try to build the Swift-6.2/native container stack it can neither build nor
# run. No CI lane builds the container runtime yet; a future app-build lane (#69 Task 8) that needs
# it can override this at the job level. Mechanism: Package.swift gates target+product+dependency on
# this var.
env:
  ANGLESITE_SKIP_CONTAINER: '1'

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
      js: ${{ steps.filter.outputs.js }}
      template: ${{ steps.filter.outputs.template }}
      helpBook: ${{ steps.filter.outputs.helpBook }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history. We diff push events against `github.event.before`, the tip of `main`
          # before the push — which can be more than one commit back (this repo allows
          # merge-commit and rebase-merge, and has no branch protection stopping a direct
          # multi-commit push), so a shallow `before`-sized depth can undershoot and fail the
          # diff. The repo is ~9MB/474 commits, so a full clone here is still fast — cheap
          # insurance against a job that gates every other job in this workflow.
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        # Inline replacement for a third-party path-filter action: the org's Actions policy
        # only allows GitHub-owned/Verified-Creator actions, and dorny/paths-filter (an
        # individual's action, not an org) doesn't qualify — every run failed at startup with
        # no job ever dispatched. This reproduces the same four filter groups with plain git
        # + bash so the gating job has no external-action dependency at all.
        #
        # `.github/workflows/ci.yml` is in every group: a change to this file should never
        # cause a job to go unevaluated just because we're the ones who touched the filters.
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$BASE_SHA"
          else
            base="$BEFORE_SHA"
            # First push of a new branch (or a force-push) reports an all-zero `before` — fall
            # back to the parent commit, and to the empty tree if there isn't one (initial
            # commit), which conservatively treats every tracked file as changed.
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
              base=$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)
            fi
          fi

          echo "Diffing against: $base"
          declare -a changed=()
          mapfile -t changed < <(git diff --name-only "$base" HEAD)
          printf '  changed: %s\n' "${changed[@]}"

          matches() {
            local f pattern
            for f in "${changed[@]}"; do
              for pattern in "$@"; do
                case "$f" in
                  $pattern) return 0 ;;
                esac
              done
            done
            return 1
          }

          swift=false; js=false; template=false; helpBook=false
          matches 'Package.swift' 'Package.resolved' 'project.yml' 'Sources/**' 'Tests/**' 'Resources/Template/**' 'scripts/**' '.github/workflows/ci.yml' && swift=true
          matches 'JS/edit-overlay/**' 'scripts/node-version.txt' '.github/workflows/ci.yml' && js=true
          matches 'Resources/Template/**' 'scripts/node-version.txt' '.github/workflows/ci.yml' && template=true
          matches 'Resources/Anglesite.help/**' 'scripts/check-help-links.sh' '.github/workflows/ci.yml' && helpBook=true

          echo "swift=$swift" >> "$GITHUB_OUTPUT"
          echo "js=$js" >> "$GITHUB_OUTPUT"
          echo "template=$template" >> "$GITHUB_OUTPUT"
          echo "helpBook=$helpBook" >> "$GITHUB_OUTPUT"

  edit-overlay:
    name: JS edit-overlay (lint/typecheck/test)
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: JS/edit-overlay
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Track the vendored runtime (scripts/vendor-node.sh) so CI tests on the
          # same Node major the app ships.
          node-version-file: scripts/node-version.txt
          cache: npm
          cache-dependency-path: JS/edit-overlay/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  template-worker:
    name: Template Worker (build/test)
    needs: changes
    if: needs.changes.outputs.template == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: Resources/Template
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: scripts/node-version.txt
          cache: npm
          cache-dependency-path: Resources/Template/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:worker
      - run: npm run build

  help-book-links:
    name: Help Book links
    needs: changes
    if: needs.changes.outputs.helpBook == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Split out of edit-overlay: a Help Book-only change shouldn't pay for a full npm
    # install/lint/typecheck/test cycle just to reach this check. Plain bash+grep, no deps.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check Help Book links
        run: scripts/check-help-links.sh

  linux-build-test:
    name: Linux (portable SwiftPM targets)
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Cross-platform port, phase 1 "purity" (2026-07-08 design §9/§10): the compiler is the
    # purity lint. Off-Darwin, Package.swift exposes only the targets that compile there
    # (AnglesiteSiteModel today); each seam PR that purifies more of AnglesiteCore expands
    # that set until `swift build && swift test` covers the whole portable core. The official
    # Swift image pins the toolchain (and ships the right libxml2), so this lane is immune to
    # runner-image drift.
    container:
      image: swift:6.3.3-noble
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Show toolchain versions
        run: swift --version

      # Keyed on the swift:6.3.3-noble image (a different image tag would need a different
      # cache) + Package.resolved (dependency changes shouldn't reuse a stale checkout) +
      # commit SHA (so every run saves fresh; restore-keys below fall back to the closest
      # match instead of requiring an exact one). SwiftPM's own incremental build tracking
      # handles the rest — a partial-match restore never produces wrong output, only a
      # partially-warm cache.
      - name: Cache SwiftPM build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build
          key: swiftpm-linux-6.3.3-noble-${{ hashFiles('Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            swiftpm-linux-6.3.3-noble-${{ hashFiles('Package.resolved') }}-
            swiftpm-linux-6.3.3-noble-

      - name: Build (debug)
        run: swift build -c debug

      - name: Test
        run: swift test -c debug --parallel

  build-test:
    # macos-26, not macos-15: the macos-15 image's OS libswift_Concurrency (Swift 6.2.3-era,
    # no assertions) carries a task-allocator bug (swiftlang/swift#86204 class) that crashed
    # PR #644's test run 5/5 with "freed pointer was not the last allocation" — the trigger is
    # an allocation pattern in the compiled binary, not any specific test, so any PR can trip
    # it. macOS 26.4's runtime (Swift 6.3+) has the fix; verified by running #644's exact head
    # green on macos-26 (PR #646) while it failed 5/5 on macos-15.
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The end-to-end tests spawn the real plugin's MCP server, so CI needs the sibling repo
      # present and `npm ci`-installed. Without these, the Swift Testing suites gated with
      # `.enabled(if:)` traits skip cleanly (ANGLESITE_PLUGIN_PATH absent); with them, the full
      # overlay → patcher → file-on-disk round-trip is exercised.
      - name: Checkout sibling Anglesite plugin
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Anglesite/anglesite
          # Pinned to the plugin release the app currently exercises. get_component_model
          # (plugin #410, used by the Component Editor) shipped in v1.3.0 — bump this
          # pin again the next time a newer plugin feature becomes load-bearing for CI.
          ref: v1.3.0
          path: anglesite-plugin

      - name: Set up Node (for plugin MCP server tests)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Track the vendored runtime (scripts/vendor-node.sh) so the e2e tests spawn
          # the plugin's MCP server on the same Node the app embeds.
          node-version-file: scripts/node-version.txt

      - name: Install plugin dependencies
        working-directory: anglesite-plugin
        run: npm ci --no-audit --no-fund

      - name: Select latest available Xcode
        # CLAUDE.md mandates Xcode 27+ (macOS 27 SDK — LongRunningIntent / CancellableIntent /
        # SwiftUI 27 @State macro semantics). The previous hardcoded Xcode 16 worked only
        # because `swift build` didn't compile the macOS-27-API code path (it was in the app
        # target). #104 moves the App Intents into a SwiftPM library and surfaces the gap.
        # Pick the newest Xcode pre-installed on the runner; the runner image determines what's
        # available (macos-15 typically ships Xcode 16/26 betas).
        id: xcode
        run: |
          set -euo pipefail
          ls -d /Applications/Xcode*.app 2>/dev/null | sort -V
          # Skip Xcode 26.3 on the current runner image: its toolchain builds test targets that
          # link /usr/lib/swift/libswift_DarwinFoundation3.dylib, which the image does not ship, so
          # `swift test` fails to load AnglesitePackageTests.xctest ("Library not loaded"). Prefer the
          # newest *working* Xcode — 26.3 is excluded, so 27 is still auto-selected once it lands.
          # Remove the grep once the 26.3 image is repaired (or Xcode 27 is available).
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | grep -vE '/Xcode_26\.3(\.app|\.[0-9]+\.app)$' | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST"
          # Cache-key input: a runner-image bump that changes which Xcode is "latest" must not
          # reuse a build cache from a different toolchain.
          echo "version=$(basename "$LATEST")" >> "$GITHUB_OUTPUT"

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version
          node --version

      # See the linux-build-test cache step for the key-scheme rationale. Namespaced by the
      # selected Xcode build so a runner-image toolchain bump can't restore incompatible
      # object files.
      - name: Cache SwiftPM build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build
          key: swiftpm-macos-${{ steps.xcode.outputs.version }}-${{ hashFiles('Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            swiftpm-macos-${{ steps.xcode.outputs.version }}-${{ hashFiles('Package.resolved') }}-
            swiftpm-macos-${{ steps.xcode.outputs.version }}-

      - name: Build (debug)
        run: swift build -c debug

      - name: Test
        env:
          ANGLESITE_PLUGIN_PATH: ${{ github.workspace }}/anglesite-plugin
        run: swift test -c debug --parallel

      - name: Build (release)
        run: swift build -c release

  relay-tsan:
    name: Relay concurrency suites (ThreadSanitizer)
    # macos-26 for the same OS-runtime reason as build-test: this lane runs Swift concurrency
    # suites against the host's libswift_Concurrency, so it has the same exposure to the
    # macos-15 image's Swift 6.2.x task-allocator bug.
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    # The relay suites (TurnRelay/TextStreamRelay) have no plugin/Node dependency, so this lane
    # skips the sibling-plugin checkout. TSan deterministically flags data races the probabilistic
    # `concurrentDeliver*` tests would otherwise only catch by timing luck (#203).
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select latest available Xcode
        # Same toolchain rationale as build-test: CLAUDE.md mandates Xcode 27+.
        id: xcode
        run: |
          set -euo pipefail
          # Skip Xcode 26.3 on the current runner image: its toolchain builds test targets that
          # link /usr/lib/swift/libswift_DarwinFoundation3.dylib, which the image does not ship, so
          # `swift test` fails to load AnglesitePackageTests.xctest ("Library not loaded"). Prefer the
          # newest *working* Xcode — 26.3 is excluded, so 27 is still auto-selected once it lands.
          # Remove the grep once the 26.3 image is repaired (or Xcode 27 is available).
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | grep -vE '/Xcode_26\.3(\.app|\.[0-9]+\.app)$' | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST"
          echo "version=$(basename "$LATEST")" >> "$GITHUB_OUTPUT"

      - name: Show toolchain versions
        run: swift --version

      # A distinct key namespace (`swiftpm-tsan-...`, not `swiftpm-macos-...`) — `--sanitize
      # thread` recompiles every unit with different flags, so sharing a cache with the plain
      # debug build would mean this lane can never hit and just pays the upload for nothing.
      - name: Cache SwiftPM build (ThreadSanitizer)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build
          key: swiftpm-tsan-macos-${{ steps.xcode.outputs.version }}-${{ hashFiles('Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            swiftpm-tsan-macos-${{ steps.xcode.outputs.version }}-${{ hashFiles('Package.resolved') }}-
            swiftpm-tsan-macos-${{ steps.xcode.outputs.version }}-

      - name: Run relay suites under ThreadSanitizer
        run: scripts/test-relay-tsan.sh

  xcodeproj-sync:
    name: Anglesite.xcodeproj ↔ project.yml in sync
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-15
    timeout-minutes: 10
    permissions:
      contents: read
    # Anglesite.xcodeproj is gitignored and regenerated from project.yml via XcodeGen, so a
    # stale/drifted spec never trips `swift build` above — it only bites a contributor running
    # `xcodebuild` with "cannot find … in scope" (#123). This lane regenerates the project and
    # asserts every app target still compiles the full Sources/AnglesiteApp tree. It needs only
    # xcodegen + python3 (no Xcode 27 SDK, Node, or sibling plugin), so it's fast and parallel.
    env:
      # Pinned so a future XcodeGen release can't silently change what this guard accepts.
      # Bump deliberately; keep in sync with MIN_XCODEGEN in scripts/check-xcodeproj-sync.sh.
      XCODEGEN_VERSION: 2.45.4
      # SHA-256 of the pinned release's xcodegen.zip — verified after download so a compromised
      # release (or MITM) can't substitute a different binary. Re-fetch and update on every bump.
      XCODEGEN_SHA256: 090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install XcodeGen (pinned)
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" -o /tmp/xcodegen.zip
          echo "${XCODEGEN_SHA256}  /tmp/xcodegen.zip" | shasum -a 256 --check
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen-dist
          test -x /tmp/xcodegen-dist/xcodegen/bin/xcodegen \
            || { echo "error: xcodegen binary not found at expected path after unzip — check zip layout" >&2; exit 1; }
          echo "/tmp/xcodegen-dist/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Check project sync
        run: scripts/check-xcodeproj-sync.sh

  localization-catalog:
    name: Localizable.xcstrings covers scanned string literals
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # SWIFT_EMIT_LOC_STRINGS only performs the real String Catalog merge in an interactive
    # Xcode IDE build (#811) — a CLI-only `xcodebuild build`, the only option here, never
    # merges new/removed keys into Localizable.xcstrings. This lane is a static heuristic
    # substitute: it needs only python3, so it runs on ubuntu-latest with no Xcode/xcodegen.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: scripts/check-localization-catalog.sh

  appintents-schema:
    name: AppIntents schema conformance (metadata processor)
    # macOS 27 / Xcode 27 runner: the AppSchema.WordProcessor surface and its
    # validator are macOS-27 symbols. macos-15 (Xcode 16/26) cannot run this.
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    permissions:
      contents: read
    # The AppIntents metadata processor (`appintentsmetadataprocessor --validate-assistant-intents`)
    # only runs during an xcodebuild *build* phase — never `swift build` / `swift test`. So an
    # AppSchema conformance regression (e.g. SiteEntity dropping a required `.wordProcessor.document`
    # property) passes every SwiftPM lane above and would surface only on a contributor's local
    # `xcodebuild`. This lane builds just the `AnglesiteIntents` target — which runs the processor
    # with `--validate-assistant-intents` — to gate that. Validation is build-time, so it needs NO
    # app launch (sidestepping the LaunchServices block on running a macOS-27 .app on an older host),
    # no vendored Node, no sibling plugin, and no signing — the library target pulls none of those.
    env:
      # Override the workflow-level skip: CLI xcodebuild (unlike GUI Xcode) passes this env into
      # Package.swift manifest evaluation, which would drop the AnglesiteContainer product while
      # the xcodegen-generated project still declares a dependency on it — failing at project load.
      ANGLESITE_SKIP_CONTAINER: '0'
      # Keep in sync with the xcodeproj-sync lane above (and MIN_XCODEGEN in check-xcodeproj-sync.sh).
      XCODEGEN_VERSION: 2.45.4
      XCODEGEN_SHA256: 090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select latest available Xcode
        run: |
          set -euo pipefail
          ls -d /Applications/Xcode*.app 2>/dev/null | sort -V
          # Skip Xcode 26.3 on the current runner image: its toolchain builds test targets that
          # link /usr/lib/swift/libswift_DarwinFoundation3.dylib, which the image does not ship, so
          # `swift test` fails to load AnglesitePackageTests.xctest ("Library not loaded"). Prefer the
          # newest *working* Xcode — 26.3 is excluded, so 27 is still auto-selected once it lands.
          # Remove the grep once the 26.3 image is repaired (or Xcode 27 is available).
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | grep -vE '/Xcode_26\.3(\.app|\.[0-9]+\.app)$' | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST"

      - name: Detect Xcode 27 (the schema validator is a macOS-27 facility)
        id: xcode
        # The validation needs the macOS 27 SDK. GitHub-hosted images don't ship Xcode 27 yet
        # (macos-26 tops out at 26.5 as of 2026-06), so this lane is ARMED but skips gracefully
        # — green, with a ::warning:: — until a runner provides Xcode 27 (a future hosted image,
        # or a self-hosted macOS-27 runner). It then auto-activates and enforces, no edit needed.
        run: |
          set -euo pipefail
          xcodebuild -version
          MAJOR=$(xcodebuild -version | sed -n 's/^Xcode \([0-9]*\).*/\1/p')
          if [ "${MAJOR:-0}" -ge 27 ]; then
            echo "has27=true" >> "$GITHUB_OUTPUT"
          else
            echo "has27=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=AppIntents schema validation skipped::Needs Xcode 27+, runner has ${MAJOR:-unknown}. Lane auto-activates once a runner provides Xcode 27."
            echo "SKIPPED: AppIntents schema validation requires Xcode 27 (runner has Xcode ${MAJOR:-unknown}); skipping the build steps below."
          fi

      - name: Install XcodeGen (pinned)
        if: steps.xcode.outputs.has27 == 'true'
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" -o /tmp/xcodegen.zip
          echo "${XCODEGEN_SHA256}  /tmp/xcodegen.zip" | shasum -a 256 --check
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen-dist
          test -x /tmp/xcodegen-dist/xcodegen/bin/xcodegen \
            || { echo "error: xcodegen binary not found at expected path after unzip — check zip layout" >&2; exit 1; }
          echo "/tmp/xcodegen-dist/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        if: steps.xcode.outputs.has27 == 'true'
        run: xcodegen generate

      - name: Validate AppIntents schema conformance
        if: steps.xcode.outputs.has27 == 'true'
        # Builds only the library target; ExtractAppIntentsMetadata runs the validator. A missing
        # required schema member (verified locally) fails the build with a "Missing required
        # property … from AppSchemaEntity …" halting error.
        run: xcodebuild -project Anglesite.xcodeproj -scheme AnglesiteIntents -configuration Debug build

  ci:
    name: CI required checks
    # Every job above is conditionally skipped by the `changes` path filter, so no single
    # existing job name is a reliable "did CI actually run" signal — a future branch-protection
    # rule should require this one instead. `always()` so it still runs (and can still fail)
    # when an upstream job was skipped or failed, rather than being skipped itself.
    if: always()
    needs:
      - changes
      - edit-overlay
      - help-book-links
      - linux-build-test
      - build-test
      - relay-tsan
      - xcodeproj-sync
      - localization-catalog
      - appintents-schema
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify path detection succeeded and no required job failed
        # `needs.changes.result != 'success'` catches the case this job exists for: if `changes`
        # itself errors (flaky API call, upstream Action regression), every other job's `if:`
        # condition reads an empty output and quietly resolves to "skipped" rather than
        # "failed" — this job is `always()`, so it still runs and turns that into a loud
        # failure instead of a workflow that looks CI-clean with zero tests actually run.
        # `contains(needs.*.result, 'failure')` catches ordinary job failures too, so this one
        # job is a complete required-check signal on its own.
        if: needs.changes.result != 'success' || contains(needs.*.result, 'failure')
        run: |
          echo "::error::One or more required jobs did not succeed, or path detection itself failed (which silently skips everything downstream instead of failing it)."
          exit 1
