name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edit-overlay:
    name: JS edit-overlay (lint/typecheck/test)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: JS/edit-overlay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: JS/edit-overlay/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build-test:
    runs-on: macos-15
    timeout-minutes: 15
    # Don't build the ~264MB primed npm cache in CI (#6). It's an Xcode prebuild phase
    # (scripts/vendor-npm-cache.sh), so the SwiftPM steps below never trigger it today —
    # this keeps it off if an xcodebuild step (e.g. the release archive) is ever added here.
    env:
      ANGLESITE_BUILD_NPM_CACHE: '0'
    steps:
      - uses: actions/checkout@v4

      # The end-to-end test in AnglesiteBridgeTests spawns the real plugin's MCP server, so
      # CI needs the sibling repo present and `npm ci`-installed. Without these the test cleanly
      # `XCTSkip`s; with them, the full overlay → patcher → file-on-disk round-trip is exercised.
      - name: Checkout sibling Anglesite plugin
        uses: actions/checkout@v4
        with:
          repository: Anglesite/anglesite
          path: anglesite-plugin

      - name: Set up Node (for the bundled plugin's MCP server)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install plugin dependencies
        working-directory: anglesite-plugin
        run: npm ci --no-audit --no-fund

      - name: Select latest available Xcode
        # CLAUDE.md mandates Xcode 27+ (macOS 27 SDK — LongRunningIntent / CancellableIntent /
        # SwiftUI 27 @State macro semantics). The previous hardcoded Xcode 16 worked only
        # because `swift build` didn't compile the macOS-27-API code path (it was in the app
        # target). #104 moves the App Intents into a SwiftPM library and surfaces the gap.
        # Pick the newest Xcode pre-installed on the runner; the runner image determines what's
        # available (macos-15 typically ships Xcode 16/26 betas).
        run: |
          set -euo pipefail
          ls -d /Applications/Xcode*.app 2>/dev/null | sort -V
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST"

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version
          node --version

      - name: Build (debug)
        run: swift build -c debug

      - name: Test
        env:
          ANGLESITE_PLUGIN_PATH: ${{ github.workspace }}/anglesite-plugin
        run: swift test -c debug --parallel

      - name: Build (release)
        run: swift build -c release

  relay-tsan:
    name: Relay concurrency suites (ThreadSanitizer)
    runs-on: macos-15
    timeout-minutes: 15
    # The relay suites (TurnRelay/TextStreamRelay) have no plugin/Node dependency, so this lane
    # skips the sibling-plugin checkout. TSan deterministically flags data races the probabilistic
    # `concurrentDeliver*` tests would otherwise only catch by timing luck (#203).
    steps:
      - uses: actions/checkout@v4

      - name: Select latest available Xcode
        # Same toolchain rationale as build-test: CLAUDE.md mandates Xcode 27+.
        run: |
          set -euo pipefail
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST"

      - name: Show toolchain versions
        run: swift --version

      - name: Run relay suites under ThreadSanitizer
        run: scripts/test-relay-tsan.sh
