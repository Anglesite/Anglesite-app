name: Anglesite
options:
  bundleIdPrefix: io.dwk.anglesite
  deploymentTarget:
    macOS: "27.0"
    iOS: "27.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Anglesite:
    path: .
  # Component Editor slice 4 (spec §7): STTextView code panes with tree-sitter syntax
  # highlighting — see the matching dependencies in Package.swift for the full rationale.
  STTextView:
    url: https://github.com/krzyzanowskim/STTextView
    from: 2.3.10
  # Pinned to a commit (tag 0.8.1), not `from:` — see the matching Package.swift comment: its
  # own manifest depends on Neon by `revision:`, and SwiftPM refuses a stable-version
  # requirement on a package that itself depends on an unstable-version one.
  STTextViewPluginNeon:
    url: https://github.com/krzyzanowskim/STTextView-Plugin-Neon
    revision: 5a30db4ce7908a5414e7b499e2379bdc49991cd1
  # Markdown editor substrate (#797): Anglesite's patched fork of
  # nodes-app/swift-markdown-engine, pinned by revision — see the matching
  # Package.swift comment for the full rationale.
  MarkdownEngine:
    url: https://github.com/Anglesite/swift-markdown-engine
    revision: badbaa4b9816daf3baa82de625c2551c4e0b4d81

targets:
  Anglesite:
    type: application
    platform: macOS
    sources:
      - path: Sources/AnglesiteApp
      - path: Resources/Assets.xcassets
      - path: Resources/Anglesite.sdef
      - path: Resources/Template
        type: folder
        buildPhase: resources
      - path: Resources/edit-overlay
        type: folder
        buildPhase: resources
        optional: true
      - path: Resources/Anglesite.help
        type: folder
        buildPhase: resources
        optional: true
    preBuildScripts:
      # Guard first so a Release build with unvendored container resources fails
      # before the remaining (slower) build phases run. Debug only warns.
      - name: Check container resources
        script: "\"${PROJECT_DIR}/scripts/check-container-resources.sh\""
        basedOnDependencyAnalysis: false
      - name: Build edit overlay
        script: "\"${PROJECT_DIR}/scripts/build-overlay.sh\""
        basedOnDependencyAnalysis: false
      - name: Build Help index
        script: "\"${PROJECT_DIR}/scripts/build-help-index.sh\""
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dwk.anglesite
        PRODUCT_NAME: Anglesite
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # Release keeps the clean MAS entitlements; Debug adds a temporary-exception
        # mach-lookup workaround for #775 (see Resources/Anglesite-Debug.entitlements).
        CODE_SIGN_ENTITLEMENTS: Resources/Anglesite.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "27.0"
        # String Catalog scaffolding (#528): the compiler extracts SwiftUI/String(localized:)
        # literals into Sources/AnglesiteApp/Localizable.xcstrings during Xcode builds.
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) ANGLESITE_MAS"
        # #541: weak-link FoundationModels so a beta Xcode SDK ahead of the installed macOS beta
        # seed (a symbol the SDK added but the OS doesn't export yet) can't abort dyld at launch.
        OTHER_LDFLAGS: "$(inherited) -weak_framework FoundationModels"
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          # #775 workaround: punch the com.apple.NetworkSharing mach look-up back
          # through the sandbox so container boots survive macOS 27 seeds
          # 26A5378n–26A5388g. Debug-only — never ships to MAS.
          CODE_SIGN_ENTITLEMENTS: Resources/Anglesite-Debug.entitlements
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: Anglesite
        product: AnglesiteCore
      - package: Anglesite
        product: AnglesiteBridge
      - package: Anglesite
        product: AnglesiteIntents
      - package: Anglesite
        product: AnglesiteContainer
      - package: STTextView
        product: STTextView
      - package: STTextViewPluginNeon
        product: STTextView-Plugin-Neon
      - package: MarkdownEngine
        product: MarkdownEngine
      - target: AnglesiteQuickLookPreview
        embed: true
      - target: AnglesiteQuickLookThumbnail
        embed: true

  # iOS thin client (#71): remote-only shell over RemoteSandboxSiteRuntime. Links only the
  # shared pieces it can use (Core's HTTP MCP client + sandbox control, the Bridge boundary,
  # and the AnglesiteIOS WKWebView wrapper) — never AnglesiteContainer or the editor packages.
  AnglesiteMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources/AnglesiteMobile
      - path: Resources/edit-overlay
        type: folder
        buildPhase: resources
        optional: true
    preBuildScripts:
      - name: Build edit overlay
        script: "\"${PROJECT_DIR}/scripts/build-overlay.sh\""
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dwk.anglesite.ios
        PRODUCT_NAME: Anglesite
        INFOPLIST_FILE: Resources/Info-iOS.plist
        GENERATE_INFOPLIST_FILE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "27.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: Anglesite
        product: AnglesiteCore
      - package: Anglesite
        product: AnglesiteBridge
      - package: Anglesite
        product: AnglesiteIOS

  AnglesiteQuickLookPreview:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/AnglesiteQuickLookPreview
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dwk.anglesite.QuickLookPreview
        PRODUCT_NAME: AnglesiteQuickLookPreview
        INFOPLIST_FILE: Resources/QuickLookPreview/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Resources/QuickLookPreview/AnglesiteQuickLookPreview.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "27.0"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: Anglesite
        product: AnglesiteQuickLookSupport

  AnglesiteQuickLookThumbnail:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/AnglesiteQuickLookThumbnail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dwk.anglesite.QuickLookThumbnail
        PRODUCT_NAME: AnglesiteQuickLookThumbnail
        INFOPLIST_FILE: Resources/QuickLookThumbnail/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Resources/QuickLookThumbnail/AnglesiteQuickLookThumbnail.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "27.0"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: Anglesite
        product: AnglesiteQuickLookSupport

schemes:
  Anglesite:
    build:
      targets:
        Anglesite: all
    run:
      config: Debug
    archive:
      config: Release
  AnglesiteMobile:
    build:
      targets:
        AnglesiteMobile: all
    run:
      config: Debug
    archive:
      config: Release
