name: Anglesite
options:
  bundleIdPrefix: io.dwk.anglesite
  deploymentTarget:
    macOS: "27.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Anglesite:
    path: .

targets:
  Anglesite:
    type: application
    platform: macOS
    sources:
      - path: Sources/AnglesiteApp
      - path: Resources/Assets.xcassets
      - path: Resources/Template
        type: folder
        buildPhase: resources
      - path: Resources/plugin
        type: folder
        buildPhase: resources
        optional: true
      - path: Resources/edit-overlay
        type: folder
        buildPhase: resources
        optional: true
      - path: Resources/Anglesite.help
        type: folder
        buildPhase: resources
        optional: true
    preBuildScripts:
      # Guard first so a Release build with unvendored container resources fails
      # before the (slow) plugin copy/npm install phases run. Debug only warns.
      - name: Check container resources
        script: "\"${PROJECT_DIR}/scripts/check-container-resources.sh\""
        basedOnDependencyAnalysis: false
      - name: Bundle Anglesite plugin
        script: "\"${PROJECT_DIR}/scripts/copy-plugin.sh\""
        basedOnDependencyAnalysis: false
      - name: Build edit overlay
        script: "\"${PROJECT_DIR}/scripts/build-overlay.sh\""
        basedOnDependencyAnalysis: false
      - name: Build Help index
        script: "\"${PROJECT_DIR}/scripts/build-help-index.sh\""
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dwk.anglesite
        PRODUCT_NAME: Anglesite
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Resources/Anglesite.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "27.0"
        # String Catalog scaffolding (#528): the compiler extracts SwiftUI/String(localized:)
        # literals into Sources/AnglesiteApp/Localizable.xcstrings during Xcode builds.
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) ANGLESITE_MAS"
        # #541: weak-link FoundationModels so a beta Xcode SDK ahead of the installed macOS beta
        # seed (a symbol the SDK added but the OS doesn't export yet) can't abort dyld at launch.
        OTHER_LDFLAGS: "$(inherited) -weak_framework FoundationModels"
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: Anglesite
        product: AnglesiteCore
      - package: Anglesite
        product: AnglesiteBridge
      - package: Anglesite
        product: AnglesiteIntents
      - package: Anglesite
        product: AnglesiteContainer

schemes:
  Anglesite:
    build:
      targets:
        Anglesite: all
    run:
      config: Debug
    archive:
      config: Release
