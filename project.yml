name: Anglesite
options:
  bundleIdPrefix: dev.anglesite
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Anglesite:
    path: .

targets:
  Anglesite:
    type: application
    platform: macOS
    sources:
      - path: Sources/AnglesiteApp
      - path: Resources/Assets.xcassets
      - path: Resources/node-runtime
        type: folder
        buildPhase: resources
        optional: true
      - path: Resources/plugin
        type: folder
        buildPhase: resources
        optional: true
      - path: Resources/npm-cache
        type: folder
        buildPhase: resources
        optional: true
    preBuildScripts:
      - name: Vendor Node runtime
        script: "${PROJECT_DIR}/scripts/vendor-node.sh"
        basedOnDependencyAnalysis: false
      - name: Bundle Anglesite plugin
        script: "${PROJECT_DIR}/scripts/copy-plugin.sh"
        basedOnDependencyAnalysis: false
      - name: Vendor primed npm cache
        script: "${PROJECT_DIR}/scripts/vendor-npm-cache.sh"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.anglesite.app
        PRODUCT_NAME: Anglesite
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Resources/Anglesite.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
    dependencies:
      - package: Anglesite
        product: AnglesiteCore
      - package: Anglesite
        product: AnglesiteBridge

schemes:
  Anglesite:
    build:
      targets:
        Anglesite: all
    run:
      config: Debug
    archive:
      config: Release
